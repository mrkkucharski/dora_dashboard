name: Refresh DORA data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,14,22 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collectors
        env:
          GITHUB_TOKEN: ${{ secrets.DORA_GITHUB_TOKEN }}
          GITHUB_ORG: ${{ vars.DORA_GITHUB_ORG }}
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USERNAME: ${{ secrets.JENKINS_USERNAME }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
          SPINNAKER_GATE_URL: ${{ secrets.SPINNAKER_GATE_URL }}
          SPINNAKER_API_TOKEN: ${{ secrets.SPINNAKER_API_TOKEN }}
        run: |
          python scripts/collect_github.py
          python scripts/collect_jenkins.py
          python scripts/collect_spinnaker.py
          python scripts/normalize_events.py
          python scripts/compute_dora.py

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh DORA dashboard data"
          file_pattern: "data/*.json dashboard/public/data/*.json"
